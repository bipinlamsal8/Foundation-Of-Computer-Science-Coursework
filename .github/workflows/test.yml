name: Security Scripts CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Security Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Display Python version
        run: python --version

      - name: Run attack demonstration
        run: python Task-1/attack_runner.py

      - name: Run JWT demonstration
        run: python Task-1/jwt_demo.py

      - name: Run automated security tests
        run: python Task-1/test_security.py

  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/foundation-task1:latest ./Task-1

      - name: Run attack demo in Docker
        run: docker run ${{ secrets.DOCKER_USERNAME }}/foundation-task1:latest

      - name: Run JWT demo in Docker
        run: docker run ${{ secrets.DOCKER_USERNAME }}/foundation-task1:latest python3 jwt_demo.py

      - name: Run tests in Docker
        run: docker run ${{ secrets.DOCKER_USERNAME }}/foundation-task1:latest python3 test_security.py

      - name: Push image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/foundation-task1:latest
